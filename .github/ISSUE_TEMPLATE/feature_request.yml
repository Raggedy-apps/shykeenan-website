name: 🚀 Feature Request
description: Suggest a new feature for the Shy Keenan Memorial Archive
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! This helps improve the Shy Keenan Memorial Archive.
        
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: What feature would you like to see added?
      placeholder: Describe the feature you'd like to see...
    validations:
      required: true
      
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature be used? What problem does it solve?
      placeholder: Explain how this feature would be beneficial...
    validations:
      required: true
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature?
      options:
        - Low - Nice to have
        - Medium - Would improve experience
        - High - Important for accessibility or core functionality
        - Critical - Required for memorial site purpose
    validations:
      required: true
      
  - type: checkboxes
    id: feature-areas
    attributes:
      label: Feature Areas (Select all that apply)
      description: Which areas of the site would this feature affect?
      options:
        - label: 📅 Timeline/Phoenix components
        - label: 💭 Memorial/Stories section  
        - label: 🎨 Design/Accessibility
        - label: 📱 Mobile experience
        - label: ⚡ Performance optimization
        - label: 🔧 Developer experience
        - label: 🚀 Deployment/GitHub integration
        
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Considerations
      description: Any technical requirements, constraints, or suggestions?
      placeholder: |
        Consider mentioning:
        - Bundle size impact
        - Accessibility requirements
        - Browser compatibility
        - GitHub Pages compatibility
        
  - type: checkboxes
    id: implementation-help
    attributes:
      label: Implementation
      description: Are you willing to help implement this feature?
      options:
        - label: I'd like to work on this feature
        - label: I can help with testing
        - label: I have design suggestions
        - label: I found relevant resources/examples