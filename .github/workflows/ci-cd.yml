name: Unified CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '19'
  REGISTRY: 'ghcr.io'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository: 
          - shykeenan-website
          - tell-tales-game
          - timeline-hub
          - devkit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: shykeenan/${{ matrix.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint || echo "Lint not configured"
      
      - name: Run type checking
        run: npm run type-check || echo "Type check not configured"
      
      - name: Run tests
        run: npm test || echo "Tests not configured"
      
      - name: Build application
        run: npm run build || echo "Build not configured"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-${{ matrix.repository }}
          path: dist/ || build/

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run security audit
        run: npm audit --audit-level=moderate
      
      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  deploy:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist || ./

  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run AI Code Review
        run: |
          echo "🤖 Running AI-powered code review..."
          
          # Install dependencies if package.json exists
          if [ -f "package.json" ]; then
            npm ci || echo "npm ci failed, trying npm install"
            npm install || echo "npm install failed"
          fi
          
          # Run code quality checks
          npm run lint 2>/dev/null || echo "Linting not configured"
          npm run type-check 2>/dev/null || echo "Type checking not configured"
          
          # Security scan
          npm audit --audit-level=moderate || echo "Security audit not available"
          
          # Check for common issues
          echo "🔍 Checking for common code issues..."
          
          # Check for console.log statements
          if grep -r "console.log" src/ 2>/dev/null; then
            echo "⚠️ Found console.log statements - consider using proper logging"
          fi
          
          # Check for TODO comments
          if grep -r "TODO" src/ 2>/dev/null; then
            echo "📝 Found TODO comments - review and complete tasks"
          fi
      
      - name: Comment AI Review Results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let comment = '🤖 **AI Code Review Results**\\n\\n';
            
            try {
              // Check if there are any issues to report
              const lintOutput = fs.readFileSync('lint-output.log', 'utf8') || '';
              const typeCheckOutput = fs.readFileSync('type-check-output.log', 'utf8') || '';
              
              if (lintOutput || typeCheckOutput) {
                comment += '⚠️ **Issues Found:**\\n';
                if (lintOutput) comment += '- [ ] Review linting errors\\n';
                if (typeCheckOutput) comment += '- [ ] Check type safety\\n';
                comment += '\\nPlease address these items before merging.\\n';
              } else {
                comment += '✅ **No issues found!**\\n\\nYour code looks great.\\n';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not create comment:', error.message);
            }